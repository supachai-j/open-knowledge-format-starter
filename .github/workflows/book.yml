# Build the OKF manual (Thai + English mdBook) and deploy to GitHub Pages.
# Thai at the site root, English under /en/, plus an embedded example graph and PDFs.
name: book
on:
  push:
    branches: [main]
    paths: ["book/**", "book-en/**", "tools/**", "wiki/**", ".github/workflows/book.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: "0.4.40"
    steps:
      - uses: actions/checkout@v6
      - name: Install mdBook
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin
      - name: Build Thai book (site root)
        run: mdbook build book
      - name: Build English book
        run: mdbook build book-en
      - name: Assemble site (EN under /en, example graph)
        run: |
          python3 tools/okf-viz.py ./wiki --name "Self-OKF Wiki"
          cp wiki/viz.html book/book/viz-example.html
          mkdir -p book/book/en
          cp -r book-en/book/* book/book/en/
          cp wiki/viz.html book/book/en/viz-example.html
      - name: Generate PDFs (best-effort)
        continue-on-error: true
        run: |
          # Thai fonts MUST be present on the runner, else Chrome falls back to a
          # font without Thai glyphs and the Thai PDF renders broken. fonts-thai-tlwg
          # guarantees Thai coverage; fonts-noto-* match the on-page font + emoji.
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-thai-tlwg fonts-noto-core fonts-noto-color-emoji poppler-utils \
            || sudo apt-get install -y -qq fonts-thai-tlwg poppler-utils
          sudo fc-cache -f >/dev/null 2>&1 || true
          export CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || true)"
          if [ -z "$CHROME_PATH" ]; then echo "No Chrome found — skipping PDF (in-book print page still works)."; exit 0; fi
          # puppeteer-core drives system Chrome via CDP so we can add a header + page-number footer.
          npm i --no-save puppeteer-core@24 || npm i --no-save puppeteer-core
          python3 -m pip install --quiet pypdf || python3 -m pip install --quiet --break-system-packages pypdf || true
          # For each book: measure real chapter pages (outline) → inject into the TOC →
          # render the clean cover + header/footer body → stitch cover + body[2..N].
          gen() {
            local src="$1" out="$2" title="$3" credit="$4" summ="$5" srcdir="$6" d
            d="$(mktemp -d)"
            # measure pass (real page numbers) — fully guarded; on failure the TOC just has no numbers
            if node tools/print-pdf.js "$src" "$d/measure.pdf" "$title" measure "$credit"; then
              python3 tools/pdf-toc-pages.py "$d/measure.pdf" "$summ" "$src" "$srcdir" || true
            fi
            node tools/print-pdf.js "$src" "$d/cover.pdf" ""       cover ""        || return 1
            node tools/print-pdf.js "$src" "$d/body.pdf"  "$title" body  "$credit" || return 1
            pdfseparate "$d/body.pdf" "$d/p-%04d.pdf"
            rm -f "$d/p-0001.pdf"                       # drop body's page 1 (use the clean cover instead)
            pdfunite "$d/cover.pdf" $(ls "$d"/p-*.pdf | sort) "$out"
            rm -rf "$d"
          }
          gen "$PWD/book/book/print.html"    "$PWD/book/book/okf-manual-th.pdf"     "คู่มือ Open Knowledge Format (OKF)" "เรียบเรียง Supachai Jaturaprom [TumEz] · เขียนโดย Claude Code — Opus 4.8 (AI)" "$PWD/book/src/SUMMARY.md" "$PWD/book/src" || true
          gen "$PWD/book-en/book/print.html" "$PWD/book/book/en/okf-manual-en.pdf" "The Open Knowledge Format (OKF) Handbook" "Compiled by Supachai Jaturaprom [TumEz] · Written by Claude Code — Opus 4.8 (AI)" "$PWD/book-en/src/SUMMARY.md" "$PWD/book-en/src" || true
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
